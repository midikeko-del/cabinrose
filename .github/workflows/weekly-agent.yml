# Ejen galeri + notis automatik (agent.py) - satu workflow, tiga pencetus:
#
#   webhook (repository_dispatch: telegram-update) - LALUAN UTAMA & SERTA-MERTA.
#          Cloudflare Worker terima webhook Telegram bila owner pos gambar /
#          hantar /notis, lalu cetus workflow ini dengan mesej dalam
#          client_payload. agent.py webhook proses SATU mesej itu: /notis ->
#          popup terus, gambar -> incoming/. Popup notis naik dalam ~1 minit
#          (bukan tunggu jadual). Lihat worker/ untuk kod + panduan pasang.
#   fetch  (HARIAN 15:00 UTC) - JARING KESELAMATAN sahaja. Polling getUpdates;
#          jika webhook aktif ia pulang 409 dan agent.py langkau senyap. Guna
#          bila webhook belum dipasang / Worker tumbang.
#   publish (HARIAN 16:00 UTC = 00:00 MYT) - 5 gambar terbaru dalam incoming/
#          ditapis computer vision (kabur/duplikat/auto-center - percuma, tiada
#          API berbayar), masuk depan galeri (FIFO had 30). Kosong -> skip senyap.
#
# build-notis.php dijalankan pada SETIAP larian (bukan setakat bila /notis
# diterima) supaya notis yang tamat tempoh turut tergugur secara automatik
# dalam masa <=1 hari tanpa sebarang arahan Telegram - build ini semak
# expiry >= hari-ini setiap kali dijalankan.
#
# Notifikasi /notis dihantar TERUS oleh agent.py (tg_send dalam handle_notis)
# sebaik arahan diproses - bukan langkah berasingan dalam workflow ini.
#
# PHP di sini jalan MASA BUILD sahaja (jana index.html + en/index.html
# statik) - GitHub Pages hanya menghidang fail statik itu.
#
# Secrets diperlukan: TELEGRAM_TOKEN, TELEGRAM_CHAT_ID
# Bot mesti ahli group dan privacy mode dimatikan (@BotFather /setprivacy).

name: Cabin Rose Agent

on:
  repository_dispatch:
    types: [telegram-update] # webhook Telegram -> Cloudflare Worker -> sini (serta-merta)
  schedule:
    - cron: "0 15 * * *" # fetch: harian 15:00 UTC - jaring keselamatan (laluan utama = webhook)
    - cron: "0 16 * * *" # publish: harian, 16:00 UTC = 00:00 MYT
  workflow_dispatch:
    inputs:
      mode:
        description: "Mod larian"
        type: choice
        options: [fetch, publish, webhook]
        required: true

permissions:
  contents: write

# Larian webhook mesti TIDAK membatalkan satu sama lain: bila owner hantar album
# (banyak gambar), Telegram cetus beberapa larian dalam saat yang sama. Satu
# kumpulan concurrency berkongsi akan buat GitHub batalkan larian "pending" -
# gambar tercicir. Jadi setiap mesej Telegram dapat kumpulan UNIK (ikut
# message_id); larian berjadual (fetch/publish/manual) kekal berkongsi satu
# kumpulan supaya bersiri. Perlumbaan push antara larian selari dikendali oleh
# gelung cuba-semula dalam langkah commit.
concurrency:
  group: ${{ github.event_name == 'repository_dispatch' && format('tg-{0}', github.event.client_payload.message.message_id) || 'gallery-repo-writes' }}
  cancel-in-progress: false

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tentukan mod
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ inputs.mode }}"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            MODE="webhook"
          elif [ "${{ github.event.schedule }}" = "0 16 * * *" ]; then
            MODE="publish"
          else
            MODE="fetch"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Mod: $MODE"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Jalankan ejen
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE: ${{ toJSON(github.event.client_payload.message) }}
        run: python agent.py ${{ steps.mode.outputs.mode }}

      - name: Pasang PHP (untuk jana HTML statik)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: gd

      - name: Jana semula galeri (larian publish sahaja)
        if: steps.mode.outputs.mode == 'publish'
        run: php tools/build-gallery.php

      - name: Jana semula popup notis (setiap larian - kuatkuasa auto-tamat)
        run: php tools/build-notis.php

      - name: Jana semula /en/
        run: php tools/build-en.php

      - name: Commit & push (jika ada perubahan)
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "tiada perubahan"
          else
            if [ "${{ steps.mode.outputs.mode }}" = "publish" ]; then
              git commit -m "feat(auto): kemas kini galeri harian dari Telegram"
            elif [ "${{ steps.mode.outputs.mode }}" = "webhook" ]; then
              git commit -m "chore(auto): notis/gambar Telegram (webhook serta-merta)"
            else
              git commit -m "chore(auto): kutip gambar Telegram harian"
            fi
            # Larian webhook album berjalan selari (kumpulan concurrency unik),
            # jadi push boleh berlumba (non-fast-forward). Cuba semula dgn
            # rebase supaya tiada gambar tercicir walau beberapa larian serentak.
            pushed=false
            for i in 1 2 3 4 5 6; do
              git pull --rebase origin main && git push origin main && { pushed=true; break; }
              echo "push cuba $i gagal - rebase & cuba semula..."
              sleep $((RANDOM % 5 + 2))
            done
            if [ "$pushed" != "true" ]; then
              echo "RALAT: push gagal selepas 6 cubaan"; exit 1
            fi
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Notifikasi Telegram
        if: steps.mode.outputs.mode == 'publish' && steps.commit.outputs.changed == 'true'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TEXT="$(printf '%s\n\nLihat: https://cabinrose.my/#galeri' "$(cat state/last-run.txt)")"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${TEXT}"
